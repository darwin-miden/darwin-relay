# Darwin Relay — Sepolia deployment registry.
#
# Source of truth for the addresses the relay service reads via env
# vars (DARWIN_RELAY_ETH_CONTRACT, DARWIN_RELAY_DEPOSIT_TOKEN, etc.).
# Updated by contracts/script/DeployRelay.s.sol; treat as
# generated-but-committed.

[network]
name      = "Sepolia"
chain_id  = 11155111
rpc_http  = "https://ethereum-sepolia-rpc.publicnode.com"
rpc_ws    = "wss://ethereum-sepolia-rpc.publicnode.com"
explorer  = "https://sepolia.etherscan.io"
deployed  = "2026-05-17"

# M2 Track 1 stack — DarwinStrategy registry + 3 basket tokens.
# Deployed from darwin-bridge-adapter/contracts/script/DeployM2Stack.s.sol.
# basketId = keccak256(symbol); registered in DarwinStrategy.
[m2_strategy]
address = "0x635E19c61CD09d145D57A88cE8185Ddf27fA356F"
admin   = "0xf6d3C9Ed2115A5197F96f6189F6D63B51022Fe16"

[m2_baskets.DCC]
basket_id      = "0x1fbfef9aa7f4e8f8bd84b940396c9263c0c2ac2212f53759ceb3b71aaeed43fe"
token_address  = "0x1EB7Bd808402824232853e66DF6843D68462B7A4"
mint_authority = "0xf6d3C9Ed2115A5197F96f6189F6D63B51022Fe16"

[m2_baskets.DAG]
basket_id      = "0x74491929c2f72408e48b338222172a8a07d8c3087617d09881d00d72278eb6c1"
token_address  = "0x73F18087dd45d180e75cADcD383479624326E336"
mint_authority = "0xf6d3C9Ed2115A5197F96f6189F6D63B51022Fe16"

[m2_baskets.DCO]
