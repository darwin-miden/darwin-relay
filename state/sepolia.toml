# ---------------------------------------------------------------------
# 2026-05-22 deep-investigation results.
#
# Q: Why is the Bali agglayer L1->L2 not flipping ready_for_claim?
# A: gateway-fm's hosted bridge-service indexer is stuck.
#    L1 contract `lastUpdatedDepositCount()` returns 1132363 (fresh).
#    `/api/merkle-proof?deposit_cnt=N` returns "not synchronized
#    deposit" for ALL N except a single sentinel at cnt=1132000.
#    Our deposit 1132347 + 12 neighbors all unsynced. The indexer
#    appears frozen on a snapshot of root 0xbb7f8b38..., while L1
#    has progressed to root 0x6a2a9c4b... since then.
# Action: not our infra; tooling is ready, run again when service
# catches up. Sent observation to Brian + included L1 contract refs.
# ---------------------------------------------------------------------

