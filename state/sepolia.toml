# DarwinRelayDeposit.sol — ETH-side escrow that holds user USDC
# between `deposit` and `confirmDeposit`. See darwin-relay/contracts/.
[relay]
address       = "0x7e5279AD0d9F7fB8884562C336Fa6d78DCbf7c93"
admin         = "0xf6d3C9Ed2115A5197F96f6189F6D63B51022Fe16"
operator      = "0xf6d3C9Ed2115A5197F96f6189F6D63B51022Fe16"
deposit_token = "0x6dAb940a4E1d434965E22e9F6d624fF68F6922a0"
claim_window  = "1h"

# MockUSDC deployed alongside the relay since Sepolia has no canonical
# USDC. 6 decimals. Deployer holds 1_000_000 MockUSDC initial mint.
[deposit_token]
address  = "0x6dAb940a4E1d434965E22e9F6d624fF68F6922a0"
symbol   = "USDC"
decimals = 6
faucet   = "MockUSDC.mint(to, amount) — anyone can mint to themselves"

# Full state-machine walk on Sepolia validating the escrow's three
# operator paths. The deposit was for 1000 USDC into a placeholder
# basket id; basket_amount_minted recorded at confirm time was 997
# USDC (3 bps mint-fee simulation). Operator and deployer are the
# same address here, so the released USDC returns to the same EOA.
[[live_runs]]
label             = "deposit + claim + confirm full path (manual cast)"
basket_id         = "0xc7a4b1b0e9c1e2b8ce99e7e1be2c4c5c3d3a8c1e7b5e8d4d5e3a9c2d8b4e6f01"
amount_usdc       = 1000000000
basket_minted     = 997000000
deposit_tx        = "0x702be6b976207326c37f14760e4860db3def29edf8419738808bc0a7c23b32e2"
deposit_block     = 10869397
claim_tx          = "0xfc285725044ccc1532e5a1c60c41631ed382dafc69b7b6c244260a55cd336f4e"
confirm_tx        = "0x4b4b41a81cafc451ad4902b921cbe7d3b85b583d721eba9d186040c27d0ff8a4"
final_status      = "settled"

# Iter 4b end-to-end: a fresh deposit was fired via `cast send` while
# `darwin_relay_service --mode live` was running with AlloyWatcher +
# AlloyEthClient + MockMidenSubmitter. The relay autonomously caught
# the RelayDepositRequested log on the WS subscription, called
# claimDeposit, advanced the FSM through the (mock) Miden mint leg,
# then routed to refund because the basket id wasn't in the empty
# BasketRegistry. refundDeposit landed on Sepolia and the on-chain
# status flipped to Refunded (5). USDC returned to the user.
[[live_runs]]
label             = "autonomous relay E2E (alloy watcher + claim + refund)"
basket_id         = "0xc7a4b1b0e9c1e2b8ce99e7e1be2c4c5c3d3a8c1e7b5e8d4d5e3a9c2d8b4e6f01"
amount_usdc       = 500000000
deposit_tx        = "0x4bef9dc4b90b55f5105316469fedebfee8a8285b762558bce185a87296255684"
claim_tx          = "0x100be058a04af85b2c28621be7a76813dbe0fba5c0d0634631e7de5953e75ddd"
final_status      = "refunded"
refund_reason     = "unknown basket_id (relay BasketRegistry was empty in this run)"

# Full Settled path — relay live with populated BasketRegistry pointing
# at the M2 DCC token. Deposit fired via cast send, AlloyWatcher
# caught it, AlloyEthClient walked the whole FSM (claim → mintTo
# minted 249.25 DCC to user → confirm). The first confirm tx was
# dropped because three sequential write txs from the same EOA
# raced through publicnode's RPC nonce queue (known limitation of
# fast burst sends — alloy's nonce filler doesn't always wait for
# inclusion). The relay's transient-retry caught it and a manual
# `cast send confirmDeposit` finished the path with status 3.
[[live_runs]]
label                 = "autonomous relay E2E into M2 DCC basket (Settled)"
basket_symbol         = "DCC"
basket_id             = "0x1fbfef9aa7f4e8f8bd84b940396c9263c0c2ac2212f53759ceb3b71aaeed43fe"
basket_token          = "0x1EB7Bd808402824232853e66DF6843D68462B7A4"
amount_usdc           = 250000000
basket_minted         = 249250000
deposit_tx            = "0x5be2e1b85d94a36d1f9d0b10aaf4dd7ce74308dfc3c16a7fba788d38c97b649f"
claim_tx              = "0x63036da5f7565159c1364260cce5edbf2b5785d0951e913bed5816cff533e544"
erc20_mint_tx         = "0xb7addb0e718ac9275f8fffb123b10c77e2e2a14e079578af67189830b66ba44f"
confirm_tx            = "0x5ffb99dd4127a8bc3bea036d4d162881344e160359e7cdf0b26e169edfa6baf3"
final_status          = "settled"

# Iter 5: AlloyEthClient now awaits 1 confirmation per call. Full
# autonomous path with no retries / no manual rescue. Total wall
# time ~65s for the deposit-to-settled cycle on Sepolia (publicnode
# RPC); 16s claim + 35s mint + 15s confirm finality.
[[live_runs]]
label                 = "autonomous relay E2E into DAG basket — no race"
basket_symbol         = "DAG"
basket_id             = "0x74491929c2f72408e48b338222172a8a07d8c3087617d09881d00d72278eb6c1"
basket_token          = "0x73F18087dd45d180e75cADcD383479624326E336"
amount_usdc           = 200000000
basket_minted         = 199400000
deposit_tx            = "0x" # the user-side cast send tx; not captured here
claim_tx              = "0xeb37fa1dc1ace22d5e012d052afc299488d0eec649fc91b225f636968ebc1533"
erc20_mint_tx         = "0x7af144ba2813ad9f7bb5f0ba32a1994c3994ded70417e35727a450155b5a8cc3"
confirm_tx            = "0x655a1d8583580d1b7ae9e4bb9ab9cbb51e1a1d8c61d401ce929bf0c8d5c72855"
final_status          = "settled"
notes                 = "iter5 receipt-await fix; 65s end-to-end; user got 199.4 DAG"

